<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>

  <!-- Gradient accents -->
  <radialGradient id="glow1" cx="50%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Logo dot -->
  <circle cx="100" cy="80" r="8" fill="#6366f1"/>
  <!-- Logo text -->
  <text x="120" y="92" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#fafafa" letter-spacing="-0.3px">UploadKit</text>

  <!-- Main heading -->
  <text x="600" y="240" font-family="system-ui, sans-serif" font-size="62" font-weight="900" fill="#fafafa" text-anchor="middle" letter-spacing="-2px">Simple, transparent pricing</text>

  <!-- Subtitle -->
  <text x="600" y="310" font-family="system-ui, sans-serif" font-size="26" fill="#a1a1aa" text-anchor="middle">Start free, scale as you grow. No hidden fees.</text>

  <!-- Tier pills row -->
  <!-- Free -->
  <rect x="130" y="380" width="200" height="100" rx="12" fill="#141416" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="230" y="418" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="1px">FREE</text>
  <text x="230" y="456" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#fafafa" text-anchor="middle">$0</text>

  <!-- Pro (highlighted) -->
  <rect x="360" y="370" width="200" height="120" rx="12" fill="#141416" stroke="rgba(99,102,241,0.5)" stroke-width="1.5"/>
  <rect x="360" y="370" width="200" height="120" rx="12" fill="rgba(99,102,241,0.04)"/>
  <text x="460" y="410" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="1.5px">MOST POPULAR</text>
  <text x="460" y="438" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="1px">PRO</text>
  <text x="460" y="470" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#fafafa" text-anchor="middle">$15/mo</text>

  <!-- Team -->
  <rect x="590" y="380" width="200" height="100" rx="12" fill="#141416" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="690" y="418" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="1px">TEAM</text>
  <text x="690" y="456" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#fafafa" text-anchor="middle">$35/mo</text>

  <!-- Enterprise -->
  <rect x="820" y="380" width="250" height="100" rx="12" fill="#141416" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="945" y="418" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="1px">ENTERPRISE</text>
  <text x="945" y="456" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#fafafa" text-anchor="middle">Custom</text>

  <!-- Bottom domain -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="16" fill="rgba(161,161,170,0.5)" text-anchor="middle">uploadkit.dev/pricing</text>
</svg>
