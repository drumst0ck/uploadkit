<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>

  <!-- Gradient accents -->
  <radialGradient id="glow1" cx="20%" cy="0%" r="50%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="80%" cy="15%" r="40%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo dot -->
  <circle cx="100" cy="80" r="8" fill="#6366f1"/>
  <!-- Logo text -->
  <text x="120" y="92" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#fafafa" letter-spacing="-0.3px">UploadKit</text>

  <!-- Main heading -->
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="68" font-weight="900" fill="#fafafa" text-anchor="middle" letter-spacing="-2px">File Uploads for</text>
  <text x="600" y="360" font-family="system-ui, sans-serif" font-size="68" font-weight="900" fill="#fafafa" text-anchor="middle" letter-spacing="-2px">Developers. Done right.</text>

  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, sans-serif" font-size="26" fill="#a1a1aa" text-anchor="middle">5 GB free forever · BYOS support · Premium React components</text>

  <!-- CTA pill -->
  <rect x="490" y="470" width="220" height="48" rx="24" fill="#6366f1"/>
  <text x="600" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Get started free →</text>

  <!-- Bottom domain -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="16" fill="rgba(161,161,170,0.5)" text-anchor="middle">uploadkit.dev</text>
</svg>
