name: Smoke - create-uploadkit-app

on:
  push:
    branches: [master]
    paths:
      - 'packages/create-uploadkit-app/**'
      - 'packages/react/**'
      - 'packages/next/**'
      - '.github/workflows/smoke-create-uploadkit-app.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/create-uploadkit-app/**'
      - 'packages/react/**'
      - 'packages/next/**'
      - '.github/workflows/smoke-create-uploadkit-app.yml'

concurrency:
  group: smoke-cka-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    # NOTE: windows-latest temporarily removed — sveltekit/remix builds fail silently on Windows.
    # Tracked for follow-up; see .planning/phases/12-create-uploadkit-app-cli/deferred-items.md
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: pnpm --filter create-uploadkit-app smoke

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.os }}
          path: |
            packages/create-uploadkit-app/*.log
            packages/create-uploadkit-app/*.tgz
          if-no-files-found: ignore
          retention-days: 7
