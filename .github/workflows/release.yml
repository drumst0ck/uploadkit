name: Release
on:
  push:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Detect docs changes in this push and auto-create a patch changeset
      # for @uploadkitdev/mcp so the bundled docs index gets re-published.
      # The changeset is created in the workflow filesystem only — changesets/action
      # will consume it in the Version PR, so master never sees the auto file.
      - name: Auto-changeset for docs updates
        shell: bash
        run: |
          set -e
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q '^apps/docs/content/docs/'; then
            if ! grep -rql '@uploadkitdev/mcp' .changeset/ 2>/dev/null; then
              fn=".changeset/auto-docs-$(date -u +%s).md"
              cat > "$fn" <<'EOF'
          ---
          '@uploadkitdev/mcp': patch
          ---

          Refresh bundled docs index to match latest content on docs.uploadkit.dev.
          EOF
              echo "Created auto-changeset: $fn"
            else
              echo "@uploadkitdev/mcp already has a pending changeset — skipping auto-changeset."
            fi
          else
            echo "No docs changes in this push — skipping."
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # npm ≥ 11.5.1 is required for OIDC trusted publishing to the npm registry.
      # Node 22 bundles npm 10.x which returns 404 because no auth token is attached.
      - name: Upgrade npm (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
